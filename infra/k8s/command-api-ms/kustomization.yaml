apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: synopsis-ws

resources:
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - secret.yaml

# Patch para producción
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: command-api-ms
      spec:
        replicas: 5
        template:
          spec:
            containers:
              - name: command-api-ms
                resources:
                  requests:
                    memory: "1Gi"
                    cpu: "500m"
                  limits:
                    memory: "2Gi"
                    cpu: "2000m"
    target:
      kind: Deployment
