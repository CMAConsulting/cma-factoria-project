# Application Configuration
quarkus:
  application:
    name: dashboard-api-ms
  http:
    port: 8081
    host: ${HTTP_HOST:0.0.0.0}
    cors:
      enabled: true
  # OpenAPI
  smallrye-openapi:
    info-title: Dashboard API
    info-version: 1.0.0
    info-description: API para métricas y actividad del dashboard
  # Swagger UI
  swagger-ui:
    always-include: true
  # Health
  smallrye-health:
    root-path: /health
  # Logging
  log:
    level: INFO
  # Disable JWT in dev
  smallrye-jwt:
    enabled: false
  # Jackson - exclude null values
  jackson:
    serialization-inclusion: NON_NULL
  # Database Configuration
  datasource:
    db-kind: postgresql
    username: ${DB_USER:factoria}
    password: ${DB_PASSWORD}
    reactive:
      url: postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dashboard_db}
      max-size: 20
    devservices:
      enabled: false
  hibernate-orm:
    database:
      generation: none

# MP JWT Configuration
mp:
  jwt:
    verify:
      publickey:
        location: publicKey.pem
      issuer: https://cma-factoria.com