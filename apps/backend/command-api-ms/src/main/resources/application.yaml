# Application Configuration
quarkus:
  application:
    name: command-api-ms
  http:
    port: 8080
    host: ${HTTP_HOST:0.0.0.0}
    cors:
      enabled: true
  # OpenAPI
  smallrye-openapi:
    info-title: Command API
    info-version: 1.0.0
    info-description: API para ejecución remota de comandos en el sistema
  # Swagger UI
  swagger-ui:
    always-include: true
  # Health
  smallrye-health:
    root-path: /health
  # Logging
  log:
    level: INFO
  # Disable JWT in dev
  smallrye-jwt:
    enabled: false
  # Jackson - exclude null values
  jackson:
    serialization-inclusion: NON_NULL
  # Database Configuration
  datasource:
    db-kind: postgresql
    reactive:
      postgresql:
        url: ${DB_URL:postgresql://localhost:5432/command_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    devservices:
      enabled: false
  # Disable reactive client to use standard JDBC for dev without Docker
  reactive:
    enabled: false

# MP JWT Configuration  
mp:
  jwt:
    verify:
      publickey:
        location: publicKey.pem
      issuer: https://cma-factoria.com